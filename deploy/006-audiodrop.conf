<VirtualHost *:80>
    ServerName audiodrop.iclexi.tech

    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Host "audiodrop.iclexi.tech"

    # SSE necesita streaming sin buffer y timeouts generosos.
    ProxyTimeout 300
    ProxyPass / http://127.0.0.1:3400/ timeout=300 retry=0 flushpackets=on
    ProxyPassReverse / http://127.0.0.1:3400/

    # Tope al tamaño del cuerpo subido (las URLs son cortas, no necesitamos más).
    LimitRequestBody 8192

    ErrorLog ${APACHE_LOG_DIR}/audiodrop-error.log
    CustomLog ${APACHE_LOG_DIR}/audiodrop-access.log combined
</VirtualHost>
